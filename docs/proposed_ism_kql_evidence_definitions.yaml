# Review draft in the same schema as config/evidence_definitions.yaml.
# Replace REPLACE_WITH_LOG_ANALYTICS_WORKSPACE_ID before promoting entries.
# Assertion values of 1 are review defaults for minimum evidence volume and should be tuned per environment/control.
# These assertions check whether the associated KQL returned the expected evidence signal; they are not a final compliance decision without control-specific review.

