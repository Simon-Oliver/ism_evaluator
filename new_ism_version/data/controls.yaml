    "prose": "When manually importing data to systems, all data that fails security checks is quarantined until reviewed and subsequently approved or not approved for release."
    "ism_version": "2026.03.24"
  - "id": "ism-1187"
    "prose": "When manually exporting data from systems, the data is checked for unsuitable protective markings."
    "ism_version": "2026.03.24"
  - "id": "ism-1287"
    "prose": "Files imported or exported via gateways or CDSs undergo content sanitisation."
